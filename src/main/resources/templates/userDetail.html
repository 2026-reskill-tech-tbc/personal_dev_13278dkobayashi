<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザー設定</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	<main>
		<h2>アカウント情報編集</h2>
		<div th:if="${message}" style="color: green;">
			<p th:text="${message}"></p>
		</div>
		<form th:action="@{/user/{id}/update(id=${user.id})}" method="post">
			<table border="1">
				<tr>
					<th>名前</th>
					<td><input type="text" name="name" th:value="${user.name}"></td>
				</tr>
				<tr>
					<th>住所</th>
					<td><input type="text" name="address" th:value="${user.address}"></td>
				</tr>
				<tr>
					<th>メールアドレス</th>
					<td><input type="email" name="email" th:value="${user.email}"></td>
				</tr>
			</table>
			<button>更新</button>
		</form>
		<form th:action="@{/user/{id}/delete(id=${user.id})}" method="post">
			 <button style="color: red;">アカウントを削除</button>
		</form>
	
	</main>
</body>
</html>
