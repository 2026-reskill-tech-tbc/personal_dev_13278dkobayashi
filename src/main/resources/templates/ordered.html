<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>注文完了</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	<hr>
	<main>
		<h3>ご注文ありがとうございました。</h3>

	<footer th:replace="~{footer}"></footer>

</html>
